<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="format-detection" content="telephone=no">
  <script>
    (function () {
      const theme = localStorage.getItem('xuan-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (theme === 'dark' || (!theme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <meta name="theme-color" content="#333232">
  <link rel="icon" type="image/x-icon" href="./images/favicon.png">
  <title>翻頁鐘</title>
  <meta name="description" content="一款以翻頁動畫呈現的數位時鐘，簡約又充滿復古感。">
  <meta property="og:title" content="翻頁鐘">
  <meta property="og:description" content="一款以翻頁動畫呈現的數位時鐘，簡約又充滿復古感。">
  <meta property="og:image" content="./images/logo.png">
  <link rel="apple-touch-icon" size="180x180" href="./images/logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="翻頁鐘">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css' />
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css' />
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="wrapper">
    <main>
      <div id="clock">
        <div id="date"></div>
      </div>
    </main>

    <i id="setting" class="fa-solid fa-gear" data-bs-toggle="modal" data-bs-target="#settingModal"></i>

    <footer>
      <div class="container text-center py-2">
        © <span id="footer-year"></span> Xuan. All rights reserved.
      </div>
    </footer>
  </div>

  <div class="modal fade " id="settingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="settingsForm">
            <div class="mb-3">
              <label class="form-label">時間格式</label>
              <select class="form-select" name="timeFormat">
                <option value="24">24 小時制</option>
                <option value="12">12 小時制</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">主題</label>
              <select class="form-select" name="theme">
                <option value="light">淺色</option>
                <option value="dark">深色</option>
              </select>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js'></script>
  <script src="./js/index.js"></script>
</body>

</html>
